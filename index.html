<!DOCTYPE html>
<html>
<head>
    <title>Hi Siyera</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b090a;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .ambient-glow {
            position: absolute;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(255, 112, 150, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 5s ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        body.active .ambient-glow {
            opacity: 1;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b090a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1.5s ease;
        }

        #start-btn {
            background: rgba(255, 112, 150, 0.1);
            border: 1px solid #ffb3c6;
            color: #ffb3c6;
            padding: 16px 42px;
            font-size: 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        #start-btn:hover {
            background: rgba(255, 112, 150, 0.3);
            scale: 1.05;
        }

        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .greeting {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 5px;
            opacity: 0;
            transform: translateY(20px);
            transition: 3s ease;
            background: linear-gradient(135deg, #fff, #ffb3c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
        }

        .greeting.show {
            opacity: 1;
            transform: translateY(0);
        }

        .made-by {
            position: fixed;
            bottom: 20px;
            right: 25px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            opacity: 0;
            transition: 3s ease 2s;
        }

        body.active .made-by {
            opacity: 1;
        }

        .flower-wrapper {
            width: 350px;
            height: 350px;
            margin: 0 auto;
            filter: drop-shadow(0 0 25px rgba(255, 71, 126, 0.25));
            opacity: 0; 
            transition: opacity 2s;
        }

        body.active .flower-wrapper {
            opacity: 1;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .petal, .stamen, .leaf {
            transform-origin: 100px 140px;
            transition: all 8s cubic-bezier(0.25, 0.1, 0.25, 1);
            opacity: 0;
        }
        
        .stem {
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            transition: 4s ease-out;
        }

        .leaf {
            transform-origin: 100px 180px;
            transform: scale(0) rotate(-20deg);
        }
        
        .bp-1 { transform: scale(0) rotate(15deg); }
        .bp-2 { transform: scale(0) rotate(-15deg); }
        .bp-3 { transform: scale(0) rotate(30deg); }
        .bp-4 { transform: scale(0) rotate(-30deg); }
        .bp-5 { transform: scale(0) rotate(45deg); }

        .fp-1 { transform: scale(0) rotate(0deg); }
        .fp-2 { transform: scale(0) rotate(-20deg); }
        .fp-3 { transform: scale(0) rotate(20deg); }
        .fp-4 { transform: scale(0) rotate(-40deg); }
        .fp-5 { transform: scale(0) rotate(40deg); }

        .anther, .stigma {
            transform-origin: center;
            transform: scale(0);
            transition: 1s ease;
        }

        body.active .stem {
            stroke-dashoffset: 0;
            transition-delay: 1.5s;
        }

        body.active .leaf-l {
            transform: scale(1) rotate(0deg);
            opacity: 1;
            transition-delay: 2s;
            transition-duration: 5s;
        }

        body.active .leaf-r {
            transform: scale(1) rotate(0deg);
            opacity: 1;
            transition-delay: 2.5s;
            transition-duration: 5s;
        }

        body.active .petal, body.active .stamen {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }

        body.active .bp-1 { transition-delay: 3.5s; }
        body.active .bp-2 { transition-delay: 4.5s; }
        body.active .bp-3 { transition-delay: 5.5s; }
        body.active .bp-4 { transition-delay: 6.0s; }
        body.active .bp-5 { transition-delay: 6.5s; }

        body.active .fp-1 { transition-delay: 7.0s; }
        body.active .fp-2 { transition-delay: 7.5s; }
        body.active .fp-3 { transition-delay: 8.0s; }
        body.active .fp-4 { transition-delay: 8.5s; }
        body.active .fp-5 { transition-delay: 9.0s; }

        body.active .stamen { transition-delay: 10s; }

        body.active .anther, body.active .stigma {
            transform: scale(1);
        }

        body.active .a1 { transition-delay: 10.5s; }
        body.active .a2 { transition-delay: 10.7s; }
        body.active .a3 { transition-delay: 10.9s; }
        body.active .a4 { transition-delay: 11.1s; }
        body.active .stigma { transition-delay: 11.5s; }

        body.active .flower-wrapper {
            animation: float-flower 8s ease-in-out infinite alternate;
            animation-delay: 13s;
        }

        @keyframes float-flower {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <audio id="song" src="those_eyes.mp3" preload="auto"></audio>

    <div id="start-screen">
        <button id="start-btn">Tap to Bloom</button>
    </div>

    <div class="ambient-glow"></div>

    <div class="main-content">
        <h1 class="greeting">Hi Siyera</h1>
        <div class="flower-wrapper">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="back-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ffb3c6"/>
                        <stop offset="100%" stop-color="#ff477e"/>
                    </linearGradient>
                    <linearGradient id="front-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#fff0f5"/>
                        <stop offset="100%" stop-color="#ff7096"/>
                    </linearGradient>
                </defs>

                <path class="stem" d="M100 150 C100 170, 95 185, 90 220" stroke="#4CAF50" stroke-width="3" fill="none"/>
                <path class="leaf leaf-l" d="M100 170 C80 160, 50 165, 45 155 C45 180, 70 185, 95 180 Z" fill="#2E7D32"/>
                <path class="leaf leaf-r" d="M98 185 C120 175, 145 180, 155 165 C155 195, 125 200, 100 195 Z" fill="#2E7D32"/>
                
                <g class="back-petals">
                    <path class="petal bp-1" d="M100 140 C50 80, 70 20, 100 5 C130 20, 150 80, 100 140Z" fill="url(#back-grad)"/>
                    <path class="petal bp-2" d="M100 140 C150 110, 190 60, 170 30 C150 50, 120 80, 100 140Z" fill="url(#back-grad)"/>
                    <path class="petal bp-3" d="M100 140 C50 110, 10 60, 30 30 C50 50, 80 80, 100 140Z" fill="url(#back-grad)"/>
                    <path class="petal bp-4" d="M100 140 C140 160, 190 180, 195 140 C170 120, 130 110, 100 140Z" fill="url(#back-grad)"/>
                    <path class="petal bp-5" d="M100 140 C60 160, 10 180, 5 140 C30 120, 70 110, 100 140Z" fill="url(#back-grad)"/>
                </g>

                <g class="front-petals">
                    <path class="petal fp-1" d="M100 140 C60 180, 100 210, 100 190 C100 210, 140 180, 100 140Z" fill="url(#front-grad)"/>
                    <path class="petal fp-2" d="M100 140 C140 90, 170 120, 145 145 C120 135, 110 120, 100 140Z" fill="url(#front-grad)"/>
                    <path class="petal fp-3" d="M100 140 C60 90, 30 120, 55 145 C80 135, 90 120, 100 140Z" fill="url(#front-grad)"/>
                    <path class="petal fp-4" d="M100 140 C110 60, 160 55, 125 30 C100 65, 100 100, 100 140Z" fill="url(#front-grad)"/>
                    <path class="petal fp-5" d="M100 140 C90 60, 40 55, 75 30 C100 65, 100 100, 100 140Z" fill="url(#front-grad)"/>
                </g>

                <g class="pistils-stamens">
                    <path class="stamen s1" d="M100 140 Q95 90 75 70" stroke="#FFD166" stroke-width="1.5" fill="none"/>
                    <path class="stamen s2" d="M100 140 Q110 85 125 65" stroke="#FFD166" stroke-width="1.5" fill="none"/>
                    <path class="stamen s3" d="M100 140 Q85 110 60 105" stroke="#FFD166" stroke-width="1.5" fill="none"/>
                    <path class="stamen s4" d="M100 140 Q115 110 140 105" stroke="#FFD166" stroke-width="1.5" fill="none"/>
                    
                    <circle class="anther a1" cx="75" cy="70" r="2.5" fill="#EF476F"/>
                    <circle class="anther a2" cx="125" cy="65" r="2.5" fill="#EF476F"/>
                    <circle class="anther a3" cx="60" cy="105" r="2.5" fill="#EF476F"/>
                    <circle class="anther a4" cx="140" cy="105" r="2.5" fill="#EF476F"/>

                    <path class="stamen" d="M100 140 Q100 85 100 55" stroke="#06D6A0" stroke-width="2.5" fill="none"/>
                    <circle class="stigma" cx="100" cy="55" r="3.5" fill="#118AB2"/>
                </g>
            </svg>
        </div>
    </div>

    <div class="made-by">made by arashi for Siyeraa</div>

    <script>
        let btn = document.getElementById('start-btn');
        let scrn = document.getElementById('start-screen');
        let song = document.getElementById('song');
        let txt = document.querySelector('.greeting');

        btn.onclick = function() {
            scrn.style.opacity = '0';
            setTimeout(function() {
                scrn.remove();
            }, 1000);

            song.play();

            setTimeout(function() {
                txt.classList.add('show');
            }, 1000);

            setTimeout(function() {
                document.body.classList.add('active');
            }, 1500);
        };
    </script>
</body>
</html>

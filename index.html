<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Siyera</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #050510; overflow: hidden; }

        #intro {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 50% 60%, #0d0d2b 0%, #050510 70%);
            transition: opacity 1.2s ease;
        }
        #intro.hidden { opacity: 0; pointer-events: none; }
        #intro::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 75% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 65% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 65%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 80% 10%, rgba(255,220,100,0.8) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 5% 45%, rgba(255,200,150,0.7) 0%, transparent 100%);
            animation: twinkle 4s ease-in-out infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.6; } 100% { opacity: 1; } }

        .intro-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 8vw, 6rem);
            font-style: italic;
            color: #fff;
            text-align: center;
            line-height: 1.15;
            animation: floatTitle 3s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255,180,100,0.6), 0 0 80px rgba(255,120,60,0.3);
        }
        @keyframes floatTitle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

        .heart {
            display: inline-block; color: #ff6b9d;
            animation: heartbeat 1.2s ease-in-out infinite;
            text-shadow: 0 0 20px #ff6b9d, 0 0 40px rgba(255,107,157,0.5);
            margin-left: 0.15em;
        }
        @keyframes heartbeat { 0%,100%{transform:scale(1)} 30%{transform:scale(1.3)} 60%{transform:scale(1.1)} }

        .click-label {
            margin-top: 1rem;
            font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

        #btn-sorry {
            margin-top: 1.2rem; padding: 1rem 3rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem; font-style: italic; color: #fff;
            background: transparent;
            border: 1.5px solid rgba(255,200,100,0.5);
            border-radius: 60px; cursor: pointer;
            position: relative; overflow: hidden;
            transition: border-color 0.3s, transform 0.2s;
            box-shadow: 0 0 30px rgba(255,180,60,0.15), inset 0 0 30px rgba(255,180,60,0.05);
        }
        #btn-sorry::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,200,80,0.15), transparent 70%);
            opacity: 0; transition: opacity 0.4s;
        }
        #btn-sorry:hover { border-color: rgba(255,200,100,0.9); transform: scale(1.04); }
        #btn-sorry:hover::before { opacity: 1; }
        #btn-sorry:active { transform: scale(0.98); }

        #story {
            position: fixed; inset: 0; z-index: 50;
            pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        .story-line {
            position: absolute;
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 4.5vw, 3.2rem);
            color: #fff; text-align: center;
            padding: 0 1.5rem;
            text-shadow: 0 0 30px rgba(255,200,100,0.7), 0 0 60px rgba(255,150,60,0.4);
            opacity: 0; transform: translateY(14px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            max-width: 80vw; line-height: 1.4;
            white-space: pre-line;
        }
        .story-line.visible { opacity: 1; transform: translateY(0); }
        .story-line.fading { opacity: 0; transform: translateY(-14px); }

        #canvas { display: block; width: 100%; height: 100%; position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="intro">
    <h1 class="intro-title">Sorry Siyera <span class="heart">&#9829;</span></h1>
    <button id="btn-sorry">Sorry Siyera</button>
    <p class="click-label">click me</p>
</div>
<div id="story"></div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

const PALETTES = [
    ['#ff6b9d','#ff9eb5','#ffd6e0','#ff4081'],
    ['#a78bfa','#c4b5fd','#8b5cf6','#ede9fe'],
    ['#34d399','#6ee7b7','#10b981','#d1fae5'],
    ['#fbbf24','#fde68a','#f59e0b','#fffbeb'],
    ['#60a5fa','#93c5fd','#3b82f6','#dbeafe'],
    ['#fb7185','#fda4af','#f43f5e','#ffe4e6'],
];
function randPalette() { return PALETTES[Math.floor(Math.random()*PALETTES.length)]; }

function drawStar(cx,cy,r,color,alpha){
    ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=color;
    ctx.beginPath();
    for(let i=0;i<5;i++){
        const a=(i*4*Math.PI)/5-Math.PI/2;
        const b=((i*4+2)*Math.PI)/5-Math.PI/2;
        if(i===0) ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
        else ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
        ctx.lineTo(cx+(r*0.4)*Math.cos(b),cy+(r*0.4)*Math.sin(b));
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
}
function drawHeart(cx,cy,size,color,alpha){
    ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(cx,cy+size*0.3);
    ctx.bezierCurveTo(cx,cy,cx-size,cy,cx-size,cy-size*0.5);
    ctx.bezierCurveTo(cx-size,cy-size*1.2,cx,cy-size*1.2,cx,cy-size*0.6);
    ctx.bezierCurveTo(cx,cy-size*1.2,cx+size,cy-size*1.2,cx+size,cy-size*0.5);
    ctx.bezierCurveTo(cx+size,cy,cx,cy,cx,cy+size*0.3);
    ctx.fill(); ctx.restore();
}
function drawSparkle(cx,cy,r,color,alpha){
    ctx.save(); ctx.globalAlpha=alpha; ctx.strokeStyle=color; ctx.lineWidth=1.2;
    for(let i=0;i<4;i++){
        const a=(i*Math.PI)/2;
        ctx.beginPath();
        ctx.moveTo(cx+Math.cos(a)*r*0.3,cy+Math.sin(a)*r*0.3);
        ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        ctx.stroke();
    }
    ctx.restore();
}

class Particle {
    constructor(x,y,palette,isHeart=false,isSpecial=false){
        this.x=x; this.y=y;
        this.color=palette[Math.floor(Math.random()*palette.length)];
        const angle=Math.random()*Math.PI*2;
        const spd=isSpecial?(3+Math.random()*12):(2+Math.random()*7);
        this.vx=Math.cos(angle)*spd; this.vy=Math.sin(angle)*spd;
        this.friction=0.95; this.gravity=isSpecial?0.06:0.1;
        this.alpha=1; this.decay=0.008+Math.random()*0.012;
        this.size=isSpecial?(2+Math.random()*3):(1.5+Math.random()*2);
        this.rot=Math.random()*Math.PI*2; this.rotSpd=(Math.random()-0.5)*0.15;
        this.type=isHeart?'heart':(isSpecial?(Math.random()<0.5?'star':'sparkle'):(Math.random()<0.3?'star':'circle'));
        this.trail=[];
    }
    update(){
        this.trail.push({x:this.x,y:this.y});
        if(this.trail.length>5) this.trail.shift();
        this.vx*=this.friction; this.vy*=this.friction;
        this.vy+=this.gravity;
        this.x+=this.vx; this.y+=this.vy;
        this.alpha-=this.decay; this.rot+=this.rotSpd;
    }
    draw(){
        if(this.alpha<=0) return;
        for(let i=0;i<this.trail.length;i++){
            const ta=(this.alpha*i)/this.trail.length*0.35;
            ctx.save(); ctx.globalAlpha=Math.max(0,ta);
            ctx.beginPath(); ctx.arc(this.trail[i].x,this.trail[i].y,this.size*0.4,0,Math.PI*2);
            ctx.fillStyle=this.color; ctx.fill(); ctx.restore();
        }
        const a=Math.max(0,this.alpha);
        if(this.type==='heart'){
            ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rot);
            drawHeart(0,0,this.size*1.2,this.color,a); ctx.restore();
        } else if(this.type==='star'){
            ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rot);
            drawStar(0,0,this.size*2,this.color,a); ctx.restore();
        } else if(this.type==='sparkle'){
            drawSparkle(this.x,this.y,this.size*3,this.color,a);
        } else {
            ctx.save(); ctx.globalAlpha=a;
            ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
            ctx.fillStyle=this.color; ctx.shadowBlur=8; ctx.shadowColor=this.color;
            ctx.fill(); ctx.restore();
        }
    }
}

class RingParticle {
    constructor(x,y,angle,color){
        this.x=x; this.y=y;
        const spd=4+Math.random()*4;
        this.vx=Math.cos(angle)*spd; this.vy=Math.sin(angle)*spd;
        this.color=color; this.alpha=1; this.decay=0.018;
        this.size=1.5+Math.random(); this.friction=0.94; this.gravity=0.08;
    }
    update(){
        this.vx*=this.friction; this.vy*=this.friction;
        this.vy+=this.gravity; this.x+=this.vx; this.y+=this.vy;
        this.alpha-=this.decay;
    }
    draw(){
        if(this.alpha<=0) return;
        ctx.save(); ctx.globalAlpha=Math.max(0,this.alpha);
        ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fillStyle=this.color; ctx.shadowBlur=6; ctx.shadowColor=this.color;
        ctx.fill(); ctx.restore();
    }
}

class Rocket {
    constructor(isSpecial=false, isFinale=false){
        this.isSpecial=isSpecial;
        this.isFinale=isFinale;
        this.x=W*0.1+Math.random()*W*0.8; this.y=H;
        this.targetX=this.x+(Math.random()-0.5)*200;
        this.targetY=H*0.08+Math.random()*H*0.45;
        const dx=this.targetX-this.x, dy=this.targetY-this.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const speed=12+Math.random()*5;
        this.vx=(dx/dist)*speed; this.vy=(dy/dist)*speed;
        this.palette=randPalette(); this.color=this.palette[0];
        this.trail=[]; this.dead=false;
    }
    update(){
        this.trail.push({x:this.x,y:this.y});
        if(this.trail.length>10) this.trail.shift();
        this.vy+=0.14; this.x+=this.vx; this.y+=this.vy;
        if(this.vy>=0||this.y<=this.targetY){this.explode();this.dead=true;}
    }
    draw(){
        for(let i=1;i<this.trail.length;i++){
            const t=i/this.trail.length;
            ctx.save(); ctx.globalAlpha=t*0.8; ctx.strokeStyle=this.color;
            ctx.lineWidth=t*2.5; ctx.shadowBlur=10; ctx.shadowColor=this.color;
            ctx.beginPath(); ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);
            ctx.lineTo(this.trail[i].x,this.trail[i].y); ctx.stroke(); ctx.restore();
        }
    }
    explode(){
        const px=this.x,py=this.y,p=this.palette;
        const isHeart=this.isSpecial;
        const count=this.isFinale?600:(this.isSpecial?220:(80+Math.random()*60));
        for(let i=0;i<count;i++) particles.push(new Particle(px,py,p,isHeart&&Math.random()<0.4,this.isSpecial||this.isFinale));
        const rc=this.isFinale?60:(24+Math.floor(Math.random()*12));
        for(let i=0;i<rc;i++) particles.push(new RingParticle(px,py,(i/rc)*Math.PI*2,p[i%p.length]));
        for(let i=0;i<(this.isFinale?100:30);i++){
            const gp=new Particle(px,py,p,false,false);
            gp.vx*=0.3; gp.vy*=0.3; gp.decay=0.005+Math.random()*0.01; gp.size=1+Math.random()*1.5;
            particles.push(gp);
        }
        if(this.isSpecial && !this.isFinale){
            textFlashes.push({x:px,y:py,alpha:0,timer:0,text:messages[messageIndex%messages.length]});
            messageIndex++;
        }
        
        if (this.isFinale) {
            setTimeout(() => {
                const el=document.createElement('div');
                el.className='story-line';
                el.textContent="GoodNight Pookie <:";
                storyDiv.appendChild(el);
                void el.offsetWidth;
                el.classList.add('visible');
            }, 800);
        }
    }
}

const rockets=[], particles=[], textFlashes=[];
const messages=["sorry siyera \u2665","sorry po","palambing kaba","wag kana mag tampo","parehas tayo naga tampo ihh"];
let messageIndex=0, running=false;

function drawTextFlash(f){
    ctx.save(); ctx.globalAlpha=Math.max(0,f.alpha);
    ctx.font=`italic 400 ${Math.round(W*0.042)}px 'Playfair Display', serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#fff'; ctx.shadowBlur=24; ctx.shadowColor='#ffca3a';
    ctx.fillText(f.text,f.x,f.y); ctx.restore();
}

function animate(){
    ctx.fillStyle='rgba(5,5,16,0.18)';
    ctx.fillRect(0,0,W,H);
    if(running){
        if(Math.random()<0.032) rockets.push(new Rocket(false));
        if(Math.random()<0.009&&textFlashes.length===0) rockets.push(new Rocket(true));
    }
    for(let i=rockets.length-1;i>=0;i--){rockets[i].update();rockets[i].draw();if(rockets[i].dead)rockets.splice(i,1);}
    for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].alpha<=0)particles.splice(i,1);}
    for(let i=textFlashes.length-1;i>=0;i--){
        const f=textFlashes[i]; f.timer++;
        if(f.timer<20) f.alpha=f.timer/20;
        else if(f.timer>90) f.alpha-=0.025;
        drawTextFlash(f);
        if(f.alpha<=0) textFlashes.splice(i,1);
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(animate);
}
animate();

const storyLines=[
    "hay nako siyera",
    "nag tampo ako",
    "nag tampo karin",
    "AHAHAHA",
    "Sarap talaga ng buhay",
    "At nabaliktad pa talaga",
    "kaya ako ngayon manunuyo",
    "sige",
    "Ikaw nayan ihh:)",
    "Lakas mo talaga Idol :)",
];

const subtitles = [
    "Hay nako,\nimbes na mag lalaro tayo ngayong gabi\nnagka tampuhan pa",
    "eto ako ngayon\nnag iisip\nkung susuyuin kita",
    "ay siyempre,\nsa gandang yan pano ako hindi manunuyo",
    "sorry ha\nkasi dahil sakin\nhindi natin natuloy yung laro",
    "di ko expect na\nnagagalit pala ako\nsa ganon",
    "parang hinayaan kong\nyung maliit na inis\nlamunin yung oras natin",
    "hindi ko na mababalik yung moment na yun\npero ayoko na maulit",
    "ata",
    "kaya eto\nkahit simple lang\nhumihingi ako ng paumanhin",
    "natagalan ako gumawa hirap kasi eh",
    "Pero,\nsorry talaga <3"
];
const storyDiv=document.getElementById('story');
let storyEl=null;

function showStory(index){
    // After last line, wait then start fireworks
    if(index>=storyLines.length){
        if(storyEl){
            storyEl.classList.remove('visible');
            storyEl.classList.add('fading');
            setTimeout(()=>storyEl.remove(),900);
        }
        setTimeout(()=>{
            running=true;
            setTimeout(() => showSubtitle(0), 1500); // Start subtitles 1.5s after fireworks
        },900); // Wait for the fade out to finish before starting fireworks
        return;
    }

    // Fade out previous line
    if(storyEl){
        storyEl.classList.remove('visible');
        storyEl.classList.add('fading');
        const old=storyEl;
        setTimeout(()=>old.remove(),900);
    }

    setTimeout(()=>{
        const el=document.createElement('div');
        el.className='story-line';
        el.textContent=storyLines[index];
        storyDiv.appendChild(el);
        storyEl=el;
        void el.offsetWidth;
        el.classList.add('visible');
        // Each line stays visible for 2.2s, then next
        setTimeout(()=>showStory(index+1), 2200);
    }, index===0?0:900);
}

function showSubtitle(index) {
    if(index>=subtitles.length){
        if(storyEl){
            storyEl.classList.remove('visible');
            storyEl.classList.add('fading');
            setTimeout(()=>storyEl.remove(),900);
        }
        
        setTimeout(() => {
            running = false;
            
            setTimeout(() => {
                rockets.length = 0;
                particles.length = 0;
                textFlashes.length = 0;
                
                const finale = new Rocket(false, true);
                finale.x = W / 2;
                finale.y = H;
                finale.targetX = W / 2;
                finale.targetY = H * 0.25;
                const dx=finale.targetX-finale.x, dy=finale.targetY-finale.y;
                const dist=Math.sqrt(dx*dx+dy*dy);
                const speed=16;
                finale.vx=(dx/dist)*speed; finale.vy=(dy/dist)*speed;
                finale.palette = ['#ffd700', '#ffea00', '#ffc400', '#fff59d', '#ffffff'];
                finale.color = finale.palette[0];
                rockets.push(finale);
            }, 1000);
            
        }, 800);
        return;
    }

    if(storyEl){
        storyEl.classList.remove('visible');
        storyEl.classList.add('fading');
        const old=storyEl;
        setTimeout(()=>old.remove(),900);
    }

    setTimeout(()=>{
        const el=document.createElement('div');
        el.className='story-line';
        el.textContent=subtitles[index];
        storyDiv.appendChild(el);
        storyEl=el;
        void el.offsetWidth;
        el.classList.add('visible');
        
        // Calculate duration based on text length
        const duration = Math.max(3500, subtitles[index].length * 75);
        
        setTimeout(()=>showSubtitle(index+1), duration);
    }, 900);
}

document.getElementById('btn-sorry').addEventListener('click',()=>{
    const audio = new Audio('SVID_20260325_222144_1.mp3');
    audio.play().catch(e => console.error("Audio playback failed:", e));

    const intro=document.getElementById('intro');
    intro.classList.add('hidden');
    setTimeout(()=>{
        intro.style.display='none';
        // Start story lines — NO fireworks yet
        showStory(0);
    },1200);
});
</script>
</body>
</html>

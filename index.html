<!DOCTYPE html>
<html>
<head>
    <title>Hi Siyera</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body {
            background-color: #0b090a;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: opacity 2s ease;
        }

        .ambient-glow {
            position: absolute;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(255, 112, 150, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 5s ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        body.active .ambient-glow {
            opacity: 1;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b090a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1.5s ease;
        }

        #start-btn {
            background: rgba(255, 112, 150, 0.1);
            border: 1px solid #ffb3c6;
            color: #ffb3c6;
            padding: 16px 42px;
            font-size: 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        #start-btn:hover {
            background: rgba(255, 112, 150, 0.3);
            scale: 1.05;
        }

        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .text-seq {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 5px;
            opacity: 0;
            transition: opacity 1.5s ease;
            background: linear-gradient(135deg, #fff, #ffb3c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 2000;
            text-align: center;
            width: 90%;
            pointer-events: none;
        }

        .text-seq.show {
            opacity: 1;
        }

        .made-by-start {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem;
            color: rgba(255, 179, 198, 0.6);
            letter-spacing: 2px;
            animation: pulse-op 2s infinite alternate;
        }

        @keyframes pulse-op {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .joke-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0b090a;
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 1s ease;
            opacity: 0;
        }

        .joke-text {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .joke-btn {
            background: rgba(255, 112, 150, 0.1);
            border: 1px solid #ffb3c6;
            color: #ffb3c6;
            padding: 16px 42px;
            font-size: 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .joke-btn:hover {
            background: rgba(255, 112, 150, 0.3);
            scale: 1.05;
        }

        .flower-wrapper {
            width: 350px;
            height: 350px;
            margin: 0 auto;
            filter: drop-shadow(0 0 25px rgba(255, 71, 126, 0.25));
            opacity: 0;
            transition: opacity 2s;
        }

        body.active .flower-wrapper {
            opacity: 1;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .petal, .stamen, .leaf {
            transform-origin: 100px 140px;
            transition: all 8s cubic-bezier(0.25, 0.1, 0.25, 1);
            opacity: 0;
        }
        
        .stem {
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            transition: 4s ease-out;
        }

        .leaf {
            transform-origin: 100px 180px;
            transform: scale(0) rotate(-20deg);
        }
        
        .bp-1 { transform: scale(0) rotate(15deg); }
        .bp-2 { transform: scale(0) rotate(-15deg); }
        .bp-3 { transform: scale(0) rotate(30deg); }
        .bp-4 { transform: scale(0) rotate(-30deg); }
        .bp-5 { transform: scale(0) rotate(45deg); }

        .fp-1 { transform: scale(0) rotate(0deg); }
        .fp-2 { transform: scale(0) rotate(-20deg); }
        .fp-3 { transform: scale(0) rotate(20deg); }
        .fp-4 { transform: scale(0) rotate(-40deg); }
        .fp-5 { transform: scale(0) rotate(40deg); }

        .anther, .stigma {
            transform-origin: center;
            transform: scale(0);
            transition: 1s ease;
        }

        body.active .stem { stroke-dashoffset: 0; transition-delay: 0.5s; transition-duration: 2s; }
        body.active .leaf-l { transform: scale(1) rotate(0deg); opacity: 1; transition-delay: 1.0s; transition-duration: 3s; }
        body.active .leaf-r { transform: scale(1) rotate(0deg); opacity: 1; transition-delay: 1.5s; transition-duration: 3s; }
        
        body.active .petal, body.active .stamen { transform: scale(1) rotate(0deg); opacity: 1; }

        body.active .bp-1 { transition-delay: 2.0s; transition-duration: 5s; }
        body.active .bp-2 { transition-delay: 2.5s; transition-duration: 5s; }
        body.active .bp-3 { transition-delay: 3.0s; transition-duration: 5s; }
        body.active .bp-4 { transition-delay: 3.5s; transition-duration: 5s; }
        body.active .bp-5 { transition-delay: 4.0s; transition-duration: 5s; }

        body.active .fp-1 { transition-delay: 4.5s; transition-duration: 5s; }
        body.active .fp-2 { transition-delay: 5.0s; transition-duration: 5s; }
        body.active .fp-3 { transition-delay: 5.5s; transition-duration: 5s; }
        body.active .fp-4 { transition-delay: 6.0s; transition-duration: 5s; }
        body.active .fp-5 { transition-delay: 6.5s; transition-duration: 5s; }

        body.active .stamen { transition-delay: 7s; }

        body.active .anther, body.active .stigma { transform: scale(1); transition-duration: 0.5s; }

        body.active .a1 { transition-delay: 7.2s; }
        body.active .a2 { transition-delay: 7.4s; }
        body.active .a3 { transition-delay: 7.6s; }
        body.active .a4 { transition-delay: 7.8s; }
        body.active .stigma { transition-delay: 8.0s; }

        body.active .flower-wrapper {
            animation: float-flower 8s ease-in-out infinite alternate;
            animation-delay: 9s;
        }

        @keyframes float-flower {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-15px); }
        }

        .gallery {
            position: relative;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 35vh;
            padding-top: 50vh;
            padding-bottom: 50vh;
        }

        .gallery::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            background: repeating-linear-gradient(
                0deg,
                #ffb3c6,
                #ffb3c6 15px,
                #ff7096 15px,
                #ff7096 30px
            );
            z-index: 0;
            box-shadow: 0 0 10px rgba(255, 112, 150, 0.4);
        }

        .gallery.active {
            display: flex;
        }

        .cat-card {
            position: relative;
            z-index: 1;
            width: 85%;
            max-width: 350px;
            opacity: 0;
            transform: translateY(100px) scale(0.3);
            transition: all 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .cat-card::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 35px;
            background: #fff;
            border: 2px solid #ff7096;
            border-radius: 6px;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .cat-card.visible {
            opacity: 1;
            transform: translateY(0) scale(0.55) rotate(-6deg) translateX(-60px);
        }

        .cat-card:nth-child(even).visible {
            transform: translateY(0) scale(0.55) rotate(6deg) translateX(60px);
        }

        .cat-card.zoomed {
            transform: translateY(0) scale(1.15) rotate(0deg) translateX(0) !important;
            filter: drop-shadow(0 0 50px rgba(255, 112, 150, 0.5));
            z-index: 10;
        }

        .cat-card img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 112, 150, 0.2);
            border: 2px solid #ffb3c6;
        }
    </style>
</head>
<body>
    <audio id="song" src="those_eyes.mp3" preload="auto"></audio>
    <div id="text-sequence" class="text-seq"></div>

    <div id="start-screen">
        <button id="start-btn">Tap to Bloom</button>
        <div class="made-by-start">made by arashi for Siyeraa</div>
    </div>

    <div id="joke-screen" class="joke-screen">
        <h2 id="joke-text" class="joke-text">ehem bago tayo mag start gwapo ba si arashi?</h2>
        <div id="joke-buttons">
            <button id="joke-yes" class="joke-btn">Yes</button>
            <button id="joke-no" class="joke-btn">No</button>
        </div>
    </div>

    <section class="hero" id="hero-section">
        <div class="ambient-glow"></div>
        <div class="main-content">
            <div class="flower-wrapper">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="back-grad" cx="100" cy="140" r="100" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#5a001a"/>
                            <stop offset="30%" stop-color="#d81159"/>
                            <stop offset="80%" stop-color="#ffffff"/>
                            <stop offset="100%" stop-color="#ffffff"/>
                        </radialGradient>
                        <radialGradient id="front-grad" cx="100" cy="140" r="110" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#7a0022"/>
                            <stop offset="25%" stop-color="#ff1a55"/>
                            <stop offset="70%" stop-color="#ffd6e0"/>
                            <stop offset="100%" stop-color="#ffffff"/>
                        </radialGradient>
                    </defs>

                    <path class="stem" d="M100 150 C100 170, 95 185, 90 220" stroke="#4CAF50" stroke-width="3" fill="none"/>
                    <path class="leaf leaf-l" d="M100 170 C80 160, 50 165, 45 155 C45 180, 70 185, 95 180 Z" fill="#2E7D32"/>
                    <path class="leaf leaf-r" d="M98 185 C120 175, 145 180, 155 165 C155 195, 125 200, 100 195 Z" fill="#2E7D32"/>
                    
                    <g class="back-petals">
                        <path class="petal bp-1" d="M100 140 C50 80, 70 20, 100 5 C130 20, 150 80, 100 140Z" fill="url(#back-grad)"/>
                        <path class="petal bp-2" d="M100 140 C150 110, 190 60, 170 30 C150 50, 120 80, 100 140Z" fill="url(#back-grad)"/>
                        <path class="petal bp-3" d="M100 140 C50 110, 10 60, 30 30 C50 50, 80 80, 100 140Z" fill="url(#back-grad)"/>
                        <path class="petal bp-4" d="M100 140 C140 160, 190 180, 195 140 C170 120, 130 110, 100 140Z" fill="url(#back-grad)"/>
                        <path class="petal bp-5" d="M100 140 C60 160, 10 180, 5 140 C30 120, 70 110, 100 140Z" fill="url(#back-grad)"/>
                    </g>

                    <g class="front-petals">
                        <path class="petal fp-1" d="M100 140 C60 180, 100 210, 100 190 C100 210, 140 180, 100 140Z" fill="url(#front-grad)"/>
                        <path class="petal fp-2" d="M100 140 C140 90, 170 120, 145 145 C120 135, 110 120, 100 140Z" fill="url(#front-grad)"/>
                        <path class="petal fp-3" d="M100 140 C60 90, 30 120, 55 145 C80 135, 90 120, 100 140Z" fill="url(#front-grad)"/>
                        <path class="petal fp-4" d="M100 140 C110 60, 160 55, 125 30 C100 65, 100 100, 100 140Z" fill="url(#front-grad)"/>
                        <path class="petal fp-5" d="M100 140 C90 60, 40 55, 75 30 C100 65, 100 100, 100 140Z" fill="url(#front-grad)"/>
                    </g>

                    <g class="pistils-stamens">
                        <path class="stamen s1" d="M100 140 Q90 80 50 60" stroke="#e0fbfc" stroke-width="2" fill="none"/>
                        <path class="stamen s2" d="M100 140 Q110 80 150 60" stroke="#e0fbfc" stroke-width="2" fill="none"/>
                        <path class="stamen s3" d="M100 140 Q75 110 35 95" stroke="#e0fbfc" stroke-width="2" fill="none"/>
                        <path class="stamen s4" d="M100 140 Q125 110 165 95" stroke="#e0fbfc" stroke-width="2" fill="none"/>
                        
                        <ellipse class="anther a1" cx="50" cy="60" rx="3" ry="8" fill="#4a1a1f" transform="rotate(-30 50 60)"/>
                        <ellipse class="anther a2" cx="150" cy="60" rx="3" ry="8" fill="#4a1a1f" transform="rotate(30 150 60)"/>
                        <ellipse class="anther a3" cx="35" cy="95" rx="3" ry="8" fill="#4a1a1f" transform="rotate(-60 35 95)"/>
                        <ellipse class="anther a4" cx="165" cy="95" rx="3" ry="8" fill="#4a1a1f" transform="rotate(60 165 95)"/>

                        <path class="stamen" d="M100 140 Q100 80 100 35" stroke="#a7c957" stroke-width="4" fill="none"/>
                        <path class="stigma" d="M95 35 Q100 28 105 35 Z" fill="#380b15"/>

                        <circle class="stamen" cx="100" cy="130" r="1.5" fill="#4a1a1f" opacity="0.8" />
                        <circle class="stamen" cx="95" cy="115" r="1.5" fill="#4a1a1f" opacity="0.8" />
                        <circle class="stamen" cx="108" cy="120" r="1" fill="#4a1a1f" opacity="0.9" />
                        <circle class="stamen" cx="85" cy="125" r="1" fill="#4a1a1f" opacity="0.8" />
                        <circle class="stamen" cx="115" cy="125" r="1.5" fill="#4a1a1f" opacity="0.7" />
                        <circle class="stamen" cx="90" cy="100" r="1.5" fill="#4a1a1f" opacity="0.6" />
                        <circle class="stamen" cx="110" cy="102" r="1.5" fill="#4a1a1f" opacity="0.6" />
                        <circle class="stamen" cx="125" cy="110" r="1" fill="#4a1a1f" opacity="0.5" />
                        <circle class="stamen" cx="75" cy="110" r="1" fill="#4a1a1f" opacity="0.5" />
                    </g>
                </svg>
            </div>
        </div>
    </section>

    <section class="gallery">
    </section>

    <script>
        const galleryContainer = document.querySelector('.gallery');
        for (let i = 1; i <= 50; i++) {
            const card = document.createElement('div');
            card.className = 'cat-card';
            card.id = `cat${i}`;
            
            const img = document.createElement('img');
            img.src = `cat${i}.jpeg`;
            img.alt = `cat picture ${i}`;
            
            img.onerror = function() {
                card.remove();
            };
            
            card.appendChild(img);
            galleryContainer.appendChild(card);
        }
    </script>

    <script>
        let btn = document.getElementById('start-btn');
        let scrn = document.getElementById('start-screen');
        let song = document.getElementById('song');
        let hero = document.getElementById('hero-section');
        let seq = document.getElementById('text-sequence');
        let jokeScreen = document.getElementById('joke-screen');
        let jokeYes = document.getElementById('joke-yes');
        let jokeNo = document.getElementById('joke-no');
        let jokeText = document.getElementById('joke-text');

        let yesSize = 1;

        btn.onclick = function() {
            scrn.style.opacity = '0';
            setTimeout(function() {
                scrn.style.display = 'none';
                jokeScreen.style.display = 'flex';
                setTimeout(() => { jokeScreen.style.opacity = '1'; }, 50);
            }, 1000);
        };

        jokeNo.onclick = function() {
            yesSize += 0.5;
            jokeYes.style.transform = `scale(${yesSize})`;
            jokeYes.style.margin = `0 ${yesSize * 20}px`; 
            if (yesSize > 2) {
                jokeNo.style.opacity = '0'; 
                setTimeout(() => { jokeNo.style.display = 'none'; }, 300);
            }
        };

        jokeYes.onclick = function() {
            jokeText.innerText = "Thanks - by arashi";
            document.getElementById('joke-buttons').style.display = 'none';
            
            setTimeout(() => {
                jokeScreen.style.opacity = '0';
                setTimeout(() => {
                    jokeScreen.style.display = 'none';
                    startBloomingSequence();
                }, 1000);
            }, 2000);
        };

        function startBloomingSequence() {
            song.play();

            setTimeout(function() {
                document.body.classList.add('active');
            }, 500);

            // Flower completes around 8s. Let them stare until 11s.
            setTimeout(() => {
                hero.style.opacity = '0'; // Screen fades to black 
            }, 11000);

            // Hide the hero to avoid ghost layers blocking the clicks later
            setTimeout(() => {
                hero.style.display = 'none';
            }, 13000);

            const phrases = ["Hi Siyera", "how are you?", "I hope your doing great :)"];
            let textDelay = 12500;
            
            // Loop through texts: fade in, fade out
            for (let i = 0; i < phrases.length; i++) {
                setTimeout(() => {
                    seq.innerText = phrases[i];
                    seq.classList.add('show');
                }, textDelay + (i * 4500));

                setTimeout(() => {
                    seq.classList.remove('show');
                }, textDelay + (i * 4500) + 3300); // text visible for 3.3s
            }

            let startGallery = textDelay + (phrases.length * 4500) + 1500;

            // Start gallery zooming sequence
            setTimeout(function() {
                document.body.style.overflowY = 'auto'; 
                document.querySelector('.gallery').classList.add('active');
                
                let cats = document.querySelectorAll('.cat-card');
                
                cats.forEach(c => c.classList.add('visible'));

                cats.forEach((cat, index) => {
                    let baseDelay = 1000 + (index * 5500);

                    setTimeout(() => {
                        cat.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, baseDelay);

                    setTimeout(() => {
                        cat.classList.add('zoomed');
                    }, baseDelay + 800);

                    if (index < cats.length - 1) {
                        setTimeout(() => {
                            cat.classList.remove('zoomed');
                        }, baseDelay + 4000);
                    }
                });

                if (cats.length > 0) {
                    let fadeTime = 1000 + (cats.length * 5500) + 2000; 
                    setTimeout(() => {
                        let fadeAudio = setInterval(function () {
                            if (song.volume > 0.05) {
                                song.volume -= 0.05;
                            } else {
                                song.volume = 0;
                                song.pause();
                                clearInterval(fadeAudio);
                            }
                        }, 250);

                        let gallery = document.querySelector('.gallery');
                        gallery.style.transition = 'opacity 2s ease';
                        gallery.style.opacity = '0';

                        setTimeout(() => {
                            gallery.style.display = 'none';
                            
                            const endPhrases = ["Thank you", "for being friends with us.", "- from your dear great friends"];
                            let eDelay = 0;
                            
                            for (let i = 0; i < endPhrases.length; i++) {
                                setTimeout(() => {
                                    seq.innerText = endPhrases[i];
                                    seq.classList.add('show');
                                }, eDelay + (i * 4500));

                                setTimeout(() => {
                                    seq.classList.remove('show');
                                }, eDelay + (i * 4500) + 3300);
                            }

                            let namesDelay = eDelay + (endPhrases.length * 4500) + 1000;
                            
                            setTimeout(() => {
                                seq.innerHTML = "Arashi";
                                seq.classList.add('show');
                            }, namesDelay);

                            setTimeout(() => {
                                seq.innerHTML = "Arashi<br>Dke";
                            }, namesDelay + 2000);

                            setTimeout(() => {
                                seq.innerHTML = "Arashi<br>Dke<br>Kinchana";
                            }, namesDelay + 4000);

                        }, 2000);
                    }, fadeTime);
                }
            }, startGallery); 
        }
    </script>
</body>
</html>
